name: Full Test

on:
  push:
  pull_request:
    types: [assigned, opened, synchronize, reopened]


jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        django-version: ['<3.2', '<3.3', '<4.2', '<4.3', '<5.1', '<5.2', '<5.3', '<6.1']
        exclude:
          - python-version: '3.8'
            django-version: '<5.1'

          - python-version: '3.9'
            django-version: '<5.1'

          - python-version: '3.12'
            django-version: '<3.2'
          - python-version: '3.12'
            django-version: '<3.3'

          - python-version: '3.13'
            django-version: '<3.2'
          - python-version: '3.13'
            django-version: '<3.3'

          # as of oct 2025 looks like django < 5.2 does not support python 3.14
          - python-version: '3.14'
            django-version: '<3.2'
          - python-version: '3.14'
            django-version: '<3.3'
          - python-version: '3.14'
            django-version: '<4.2'
          - python-version: '3.14'
            django-version: '<4.3'
          - python-version: '3.14'
            django-version: '<5.1'
          - python-version: '3.14'
            django-version: '<5.2'
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test
        run: uv run --group test --prerelease allow --with "Django${{ matrix.django-version }}" pytest
  codestyle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: uv sync --group test
      - name: Ruff Linting Check
        run: uv run ruff check ninja_plus tests
      - name: mypy
        run: uv run mypy ninja_plus
